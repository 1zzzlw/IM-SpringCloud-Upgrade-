server:
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024
spring:
  data:
    redis:
      host: 47.111.22.183
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  rabbitmq:
    host: 47.111.22.183
    port: 5672
    virtual-host: /
    username: rabbitmq
    password: 123456
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1 # 消费者一次从 MQ 1条消息
        retry:
          enabled: true # 开启消费者失败重试
          initial-interval: 1000ms # 初始的失败等待时长为1秒
          multiplier: 1 # 下次失败的等待时长的倍数
          max-attempts: 3 # 最大重试次数
          stateless: false # true 无状态 false 有状态。如果业务中包含事务，这里改为false
#    publisher-confirm-type: correlated # none 关闭confirm机制  simple 同步阻塞等待MQ的回执消息  correlated MQ异步回调方式返回回执消息
#    connection-timeout: 1s # MQ的连接超时时间
#    template:
#      retry:
#        enabled: true # 开启超时重试机制
#        initial-interval: 1000ms # 失败后的初始等待时间
#        multiplier: 1 # 失败后下次等待时长的倍数
#        max-attempts: 3 # 最大重试次数
# websocket配置
netty:
  websocket:
    # 端口
    port: 8000
    cluster-id: 1
#自定义编码器的序列化算法
serializer:
  algorithm: Json

jwt:
  accessToken:
    secret: qwertyuiopasdfghjklzxcvbnmqzzzlew  # 跟im-springboot的secret必须一致
