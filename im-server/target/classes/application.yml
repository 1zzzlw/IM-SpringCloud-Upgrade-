server:
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024
spring:
  data:
    redis:
      host: 47.111.22.183
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  rabbitmq:
    host: 47.111.22.183
    port: 5672
    virtual-host: /
    username: rabbitmq
    password: 123456
    connection-timeout: 1s # MQ的连接超时时间
    template:
      retry:
        enabled: true # 开启超时重试机制
        initial-interval: 1000ms # 失败后的初始等待时间
        multiplier: 1 # 失败后下次等待时长的倍数
        max-attempts: 3 # 最大重试次数
# websocket配置
netty:
  websocket:
    # 端口
    port: 8000
    cluster-id: 1
#自定义编码器的序列化算法
serializer:
  algorithm: Json

jwt:
  accessToken:
    secret: qwertyuiopasdfghjklzxcvbnmqzzzlew  # 跟im-springboot的secret必须一致
