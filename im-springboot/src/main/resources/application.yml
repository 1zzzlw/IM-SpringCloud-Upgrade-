server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html
    min-response-size: 1024

spring:
  profiles:
    active: dev  # 默认启用本地环境
  application:
    name: im-springboot
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  AccessSecret-key: qwertyuiopasdfghjklzxcvbnmqzzzlew
  FreshSecret-key: freshqwertyuiopzxcvbnmasdfqzzzlew
  AccessExpiration: 3600000
  RefreshExpiration: 31536000000
  token-name: Authorization

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zzzlew.pojo.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.zzzlew.mapper: debug
    com.zzzlew.server: info
    com.zzzlew.controller: info

knife4j:
  enable: true
springdoc:
  api-docs.enabled: true