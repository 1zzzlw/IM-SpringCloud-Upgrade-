# user  nobody;                    # 运行 Nginx 的系统用户（生产环境建议专用用户）

# Nginx核心配置（全局）
worker_processes  auto; # 自动适配CPU核心数，最大化性能

error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

pid        logs/nginx.pid;


events {
    worker_connections  20480; # 单进程最大连接数（支持高并发WS）
    # use epoll;                  # 高性能IO模型（Linux）/ Windows自动适配
    multi_accept on;           # 让一个进程一次性接收多个新连接
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式（可选，便于排查WS连接问题）
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    # TCP缓冲优化：与 sendfile on 配合使用，让 Nginx 积攒足够数据后再发送，减少网络包数量。仅在 sendfile on 时生效。
    tcp_nopush      on;
    tcp_nodelay     on;

    gzip on;                # 开启 Gzip 压缩（节省带宽）
    gzip_min_length 1k;     # 大于 1k 的才压缩
    gzip_comp_level 4;      # 压缩等级，1-9，4 是性能与压缩率的平衡点
    gzip_types text/plain application/json application/javascript text/css;

    client_max_body_size 10M;

    # 开启sendfile：使用零拷贝技术传输文件，提高效率
    # 注释行：0 表示禁用长连接，每次请求后立即断开
    # keepalive_timeout  0;
    # 生效行：65 表示连接保持 65 秒无活动后关闭，减少频繁握手开销
    # keepalive_timeout  65;

    # 开启Gzip压缩：如果取消注释，会对文本类响应（HTML/JS/CSS）进行压缩，减少传输体积，但会增加 CPU 开销。
    #gzip  on;

    # 1. 定义WS后端服务集群
    upstream ws_cluster {
        server 127.0.0.1:8000 weight=2;  # 后端Netty节点1 权重2（分配更多连接）
        server 127.0.0.1:8001 weight=1;  # 后端Netty节点2（权重1）
        server 127.0.0.1:8002 weight=1; # 可选：节点3，权重1
        
        # ip_hash;  # 会话粘滞：同一客户端IP始终连同一后端节点（解决WS会话一致性）
        # 健康检查（Nginx 1.19+原生支持，1.28.2直接用）
        # health_check interval=3s timeout=2s passes=2 fails=2;
    }

    # websocket 的负载均衡
    server {
        listen       80;
        server_name  localhost;

        # 字符集：设置响应头 Content-Type 的字符编码为 koi8-r（俄语编码），默认使用 mime.types 中的配置。
        #charset koi8-r;

        # 独立访问日志：为此 server 块单独配置访问日志路径，区别于全局配置。
        #access_log  logs/host.access.log  main;

        # WS连接转发核心配置
        location /ws {
            # 转发到后端集群
            proxy_pass http://ws_cluster;
            
            # 关键：HTTP升级为WebSocket协议（必须配置）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 客户端标识透传（便于后端日志排查）
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 超时优化（避免WS长连接被Nginx主动断开）
            proxy_connect_timeout 60s;    # 连接建立超时
            proxy_read_timeout 3600s;     # 读超时（1小时，适配WS长连接）
            proxy_send_timeout 3600s;     # 写超时
            proxy_buffer_size 16k;        # 缓冲区优化
            proxy_buffers 4 64k;
        }

        # 可选：静态页面/健康检查入口（测试用）
        location / {
            root   html;
            index  index.html index.htm;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }

    # 定义 Http 后端集群
    upstream springboot_server {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;  # SpringBoot实例1
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;  # SpringBoot实例2
        # server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;  # SpringBoot实例3
        
        # 负载均衡策略（默认轮询）
        # ip_hash;        # 同一IP固定访问同一台（适合登录态）
        # least_conn;     # 分配给连接最少的节点（高并发推荐）
    }

    server {
        listen       81;
        server_name  localhost;
        charset utf-8;

        # 日志（单独记录Spring接口请求）
        access_log  logs/spring_access.log  main;
        error_log   logs/spring_error.log;

        location / {
            proxy_pass http://springboot_server;  # 转发到集群
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;               # 传递真实IP → 你的限流AOP能用！
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;             # 传递协议（http/https）

            # 超时配置（HTTP接口用，不要太长）
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # 缓冲区优化
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # 保持长连接，减少频繁握手
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
